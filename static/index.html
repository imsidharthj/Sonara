<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonara — Voice AI Support</title>
    <meta name="description" content="Sonara is a voice-powered AI assistant for e-commerce order support and returns.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow.purple { background: #7c3aed; top: -200px; left: -100px; }
        .bg-glow.blue { background: #2563eb; bottom: -200px; right: -100px; }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(124, 58, 237, 0.08);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            font-weight: 400;
            margin-bottom: 36px;
        }

        .mic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
        }

        .mic-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(124, 58, 237, 0.2);
            transition: all 0.3s ease;
        }

        .mic-btn {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #7c3aed, #6d28d9);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
        }

        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(124, 58, 237, 0.4); }
        .mic-btn:active { transform: scale(0.97); }

        .mic-btn svg { width: 32px; height: 32px; transition: opacity 0.2s; }

        .recording .mic-ring {
            border-color: #ef4444;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        .recording .mic-btn {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .processing .mic-btn {
            background: linear-gradient(145deg, #1e293b, #334155);
            cursor: wait;
            pointer-events: none;
        }

        .spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .processing .spinner { display: block; }
        .processing .mic-icon { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text {
            font-size: 13px;
            color: #94a3b8;
            height: 20px;
            margin-bottom: 28px;
            font-weight: 400;
        }

        .response-area {
            display: none;
            text-align: left;
            background: rgba(30, 30, 50, 0.5);
            border: 1px solid rgba(124, 58, 237, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: 8px;
            animation: fadeUp 0.4s ease;
        }

        .response-area.visible { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .response-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .user-text {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.5;
            font-style: italic;
        }

        .reply-text {
            font-size: 15px;
            color: #e2e8f0;
            line-height: 1.6;
            font-weight: 400;
        }

        .error-bar {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            margin-top: 16px;
            text-align: left;
            animation: fadeUp 0.3s ease;
        }

        .error-bar.visible { display: flex; align-items: center; gap: 12px; }

        .error-msg {
            font-size: 13px;
            color: #fca5a5;
            flex: 1;
        }

        .retry-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .retry-btn:hover { background: rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div class="bg-glow purple"></div>
    <div class="bg-glow blue"></div>

    <main class="card">
        <h1 class="logo">Sonara</h1>
        <p class="subtitle">Voice AI Support Assistant</p>

        <div class="mic-container" id="micContainer">
            <div class="mic-ring"></div>
            <button class="mic-btn" id="micBtn" aria-label="Toggle voice recording">
                <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <div class="spinner"></div>
            </button>
        </div>

        <p class="status-text" id="statusText">Tap to speak</p>

        <div class="response-area" id="responseArea">
            <div class="response-label">You said</div>
            <p class="user-text" id="userText"></p>
            <div class="response-label">Sonara</div>
            <p class="reply-text" id="replyText"></p>
        </div>

        <div class="error-bar" id="errorBar">
            <span class="error-msg" id="errorMsg"></span>
            <button class="retry-btn" id="retryBtn">Retry</button>
        </div>
    </main>

    <script>
        const micBtn = document.getElementById('micBtn');
        const micContainer = document.getElementById('micContainer');
        const statusText = document.getElementById('statusText');
        const responseArea = document.getElementById('responseArea');
        const userText = document.getElementById('userText');
        const replyText = document.getElementById('replyText');
        const errorBar = document.getElementById('errorBar');
        const errorMsg = document.getElementById('errorMsg');
        const retryBtn = document.getElementById('retryBtn');

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let lastAudioBlob = null;

        function getSessionId() {
            return sessionStorage.getItem('sonara_session_id');
        }

        function setSessionId(id) {
            sessionStorage.setItem('sonara_session_id', id);
        }

        function setState(state) {
            micContainer.className = 'mic-container ' + state;
            errorBar.classList.remove('visible');
            if (state === 'recording') statusText.textContent = 'Listening…';
            else if (state === 'processing') statusText.textContent = 'Thinking…';
            else statusText.textContent = 'Tap to speak';
        }

        function showError(message) {
            setState('');
            errorMsg.textContent = message;
            errorBar.classList.add('visible');
            statusText.textContent = 'Something went wrong';
        }

        async function sendAudio(blob) {
            setState('processing');
            const formData = new FormData();
            formData.append('audio', blob, 'recording.wav');
            const sid = getSessionId();
            if (sid) formData.append('session_id', sid);

            const res = await fetch('/voice', { method: 'POST', body: formData });
            if (!res.ok) {
                const detail = await res.text();
                throw new Error(detail || `Server error ${res.status}`);
            }

            const data = await res.json();
            setSessionId(data.session_id);

            userText.textContent = data.transcript;
            replyText.textContent = data.reply_text;
            responseArea.classList.add('visible');

            if (data.audio_base64) {
                const audio = new Audio('data:audio/mpeg;base64,' + data.audio_base64);
                audio.play();
            }

            setState('');
        }

        micBtn.addEventListener('click', async () => {
            if (micContainer.classList.contains('processing')) return;

            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    lastAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    try {
                        await sendAudio(lastAudioBlob);
                    } catch (err) {
                        showError(err.message);
                    }
                };
                mediaRecorder.start();
                isRecording = true;
                setState('recording');
            } else {
                mediaRecorder.stop();
                isRecording = false;
            }
        });

        retryBtn.addEventListener('click', async () => {
            if (!lastAudioBlob) return;
            try {
                await sendAudio(lastAudioBlob);
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
